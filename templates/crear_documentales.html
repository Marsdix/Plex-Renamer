<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear Documentales — Plex Renamer</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Baloo+2:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link href="/static/fontawesome/css/all.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/styles_global.css" />
    <link rel="icon" href="/static/icons/favicon.ico" type="image/x-icon" />
  </head>
  <body>
    <header class="app-header">
      <div class="header-inner">
        <a href="/" class="btn-glass">
          <i class="fas fa-arrow-left"></i> Inicio
        </a>
        <div class="brand">
          <div class="brand-icon"><i class="fas fa-video"></i></div>
          <div>
            <h1>Crear Documentales</h1>
            <span class="subtitle">Estructura con carpeta Extras</span>
          </div>
        </div>
        <a href="/shutdown" class="btn-glass danger">
          <i class="fas fa-power-off"></i> Salir
        </a>
      </div>
    </header>

    <main>
      <div class="form-split">
        <section class="form-card">
          <div class="form-card-header">
            <i class="fas fa-folder-plus"></i>
            <h2>Nuevo documental</h2>
          </div>
          <p class="form-card-desc">
            Crea carpeta con nombre exacto y una <code>Extras</code> dentro.
          </p>

          {% if mensaje %}
          <div class="alert {% if 'éxito' in mensaje or 'creado' in mensaje %}alert-success{% else %}alert-error{% endif %}" role="status">
            <i class="fas fa-{% if 'éxito' in mensaje or 'creado' in mensaje %}circle-check{% else %}circle-exclamation{% endif %}"></i>
            <span>{{ mensaje }}</span>
          </div>
          {% endif %}

          <form action="/crear_documentales" method="post" novalidate>
            <div class="field">
              <label for="ruta">Ruta base <span class="req">*</span></label>
              <input
                type="text"
                id="ruta"
                name="ruta"
                placeholder="/Volumes/Media/Documentales"
                autocomplete="off"
                required
              />
            </div>

            <div class="field">
              <label for="nombre">Nombre del documental <span class="req">*</span></label>
              <input
                type="text"
                id="nombre"
                name="nombre"
                placeholder="Planet Earth II (2016)"
                autocomplete="off"
                required
              />
              <span class="field-hint">Formato recomendado: <code>Título (Año)</code>.</span>
            </div>

            <button type="submit" class="btn-primary">
              <i class="fas fa-plus"></i> Crear documental
            </button>
          </form>
        </section>

        <aside class="poster-panel">
          <div class="poster-glow"></div>
          <div class="poster-frame">
            <img
              id="random-banner"
              src="/static/images/documentary_banner1.png"
              alt="Cartel decorativo de documental"
              loading="lazy"
            />
            <div class="poster-caption">
              <span>Documentales</span>
              Carpeta con Extras
            </div>
          </div>
        </aside>
      </div>
    </main>

    <footer class="app-footer">
      © 2024 <span>Gestor de Medios</span> · Plex Renamer
    </footer>

    <script src="/static/js/documentary_banner_randomizer.js"></script>
  </body>
</html>
